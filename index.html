<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카드 등록</title>
    <style>
      body {
        display: flex;
        font-family: sans-serif;
        padding: 40px;
        background: #fff;
        color: #000;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 400px;
      }

      .card-preview {
        width: 320px;
        height: 200px;
        background: #1e1e1e;
        border-radius: 12px;
        padding: 20px;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        margin-bottom: 40px;
      }

      .card-chip {
        width: 40px;
        height: 30px;
        background: #c2b880;
        border-radius: 4px;
      }

      .card-logo {
        width: 40px;
        height: 25px;
        background: url("https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png")
          no-repeat center/contain;
      }

      .card-number-preview {
        font-size: 20px;
        letter-spacing: 2px;
      }

      h2 {
        font-size: 18px;
        margin-top: 24px;
        margin-bottom: 0px;
      }

      .sub-label {
        font-size: 12px;
        color: #777;
        margin-bottom: 6px;
      }

      .input-group {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      input {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
        width: 70px;
      }

      input.full {
        width: 100%;
      }

      .input-group.expiry input {
        width: 80px;
      }

      .error-message {
        color: red;
        font-size: 12px;
        margin-bottom: 20px;
      }

      .form-section {
        margin-bottom: 30px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card-preview">
        <div class="card-chip"></div>
        <div class="card-number-preview">5511</div>
        <div class="card-logo"></div>
      </div>

      <div class="form-section">
        <h2>결제할 카드 번호를 입력해 주세요</h2>
        <div class="sub-label">본인 명의의 카드만 결제 가능합니다.</div>

        <label for="card-number">카드 번호</label>
        <div class="input-group">
          <input type="text" maxlength="4" placeholder="5511" />
          <input
            type="text"
            maxlength="4"
            placeholder="1234"
            style="border: 1px solid red"
          />
          <input type="text" maxlength="4" placeholder="1234" />
          <input type="text" maxlength="4" placeholder="1234" />
        </div>
        <div class="error-message">숫자만 입력 가능합니다.</div>
      </div>

      <div class="form-section">
        <h2>카드 유효기간을 입력해 주세요</h2>
        <div class="sub-label">월/년도(MM/YY)를 순서대로 입력해 주세요.</div>

        <label for="expiry">유효기간</label>
        <div class="input-group expiry">
          <input type="text" maxlength="2" placeholder="MM" />
          <input type="text" maxlength="2" placeholder="YY" />
        </div>
      </div>

      <div class="form-section">
        <h2>카드 소유자 이름을 입력해 주세요</h2>

        <label for="owner">소유자 이름</label>
        <input type="text" class="full" placeholder="JOHN DOE" />
      </div>
    </div>
  </body>
</html>
